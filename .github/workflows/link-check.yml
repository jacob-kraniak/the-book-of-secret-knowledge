name: Markdown Link Check

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ master ]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-verbose-mode: "yes"
          check-modified-files-only: "no"          # full scan first time
          folder-path: '.'                         # whole repo
          file-extension: '.md'
          config-file: '.markdown-link-check.json' # optional later
